<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Trainer | Irregular Verbs</title>
</head>
<body>
    <header>
        <h1>English Trainer</h1>
        <h2>Irregular Verbs</h2>
    </header>
    <main>
        <section>
            <h3>Input Fields</h3>
            <form>
                <label for="verb">Enter a verb:</label>
                <input type="text" id="verb" name="verb">
                <button type="submit">Submit</button>
            </form>
        </section>
        <section>
            <h3>Statistics</h3>
            <p>Number of correct answers: <span id="correct-answers">0</span></p>
            <p>Number of wrong answers: <span id="wrong-answers">0</span></p>
        </section>
        <section>
            <h3>Problematic Verbs</h3>
            <ul id="problematic-verbs">
                <!-- List problematic verbs here -->
            </ul>
        </section>
    </main>
</body>
</html>
